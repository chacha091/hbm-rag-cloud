services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8002:8002"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASS: change-me
      DB_NAME: tc_bonding_prediction
      FAISS_ROOT: /app/faiss_db
    volumes:
      - faiss-data:/app/faiss_db
      - hf-cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  db:
    image: mysql:8.4
    ports:
      - "3379:3306"
    environment:
      MYSQL_ROOT_PASSWORD: change-me
    volumes:
      - mysql-data:/var/lib/mysql
      - ./hbm_erd_ddl.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pchange-me"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
  faiss-data:
  hf-cache:
