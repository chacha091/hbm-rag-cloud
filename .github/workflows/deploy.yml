name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
      HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check secret presence
        run: |
          [ -n "${{ secrets.HARBOR_REGISTRY }}" ] && echo "HARBOR_REGISTRY exists" || echo "HARBOR_REGISTRY missing"
          [ -n "${{ secrets.HARBOR_USERNAME }}" ] && echo "HARBOR_USERNAME exists" || echo "HARBOR_USERNAME missing"
          [ -n "${{ secrets.AWS_REGION }}" ] && echo "AWS_REGION exists" || echo "AWS_REGION missing"

      - name: Set image metadata
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE_TAG=${GITHUB_RUN_NUMBER}-${SHORT_SHA}

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/sk057-backend:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/sk057-frontend:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "BACKEND_IMAGE_LATEST=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/sk057-backend:latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE_LATEST=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/sk057-frontend:latest" >> $GITHUB_ENV

      - name: Code build
        run: |
          python3 --version
          python3 -m py_compile backend/backend_api.py backend/rag_backend_full.py

      - name: Log in to Harbor
        run: |
          echo '${{ secrets.HARBOR_PASSWORD }}' | docker login '${{ secrets.HARBOR_REGISTRY }}' -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin


      - name: Build backend image
        run: |
          docker build --platform linux/amd64 \
            -t ${BACKEND_IMAGE} \
            -t ${BACKEND_IMAGE_LATEST} \
            -f backend/Dockerfile .

      - name: Build frontend image
        run: |
          docker build --platform linux/amd64 \
            -t ${FRONTEND_IMAGE} \
            -t ${FRONTEND_IMAGE_LATEST} \
            -f frontend/Dockerfile .

      - name: Push images to Harbor
        run: |
          docker push ${BACKEND_IMAGE}
          docker push ${BACKEND_IMAGE_LATEST}
          docker push ${FRONTEND_IMAGE}
          docker push ${FRONTEND_IMAGE_LATEST}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${AWS_REGION} \
            --name ${EKS_CLUSTER_NAME}

      - name: Ensure backend config exists
        run: |
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/configmap-backend.yaml
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/secret-backend.yaml

      - name: Apply base resources
        run: |
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/deployment-backend.yaml
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/service-backend.yaml
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/deployment-frontend.yaml
          kubectl apply -n ${K8S_NAMESPACE} -f infra/k8s/service-frontend.yaml

      - name: Update deployed images
        run: |
          kubectl -n ${K8S_NAMESPACE} set image deployment/sk057-backend backend=${BACKEND_IMAGE}
          kubectl -n ${K8S_NAMESPACE} set image deployment/sk057-frontend frontend=${FRONTEND_IMAGE}

      - name: Check rollout status
        run: |
          kubectl rollout status deployment/sk057-backend -n ${K8S_NAMESPACE} --timeout=300s
          kubectl rollout status deployment/sk057-frontend -n ${K8S_NAMESPACE} --timeout=300s
          kubectl get pods -n ${K8S_NAMESPACE}
          kubectl get svc -n ${K8S_NAMESPACE}

      - name: Logout Harbor
        if: always()
        run: |
          docker logout ${HARBOR_REGISTRY} || true
